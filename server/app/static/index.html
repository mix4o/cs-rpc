<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>cs-rpc control</title>
<style>
  :root { --bg:#0f1420; --panel:#1a2233; --line:#2b3650; --fg:#e6ebf5; --muted:#8a97b1;
          --accent:#4f8cff; --ok:#3fb950; --err:#f85149; --warn:#d29922; }
  * { box-sizing: border-box; }
  body { margin:0; font-family: system-ui, "Segoe UI", "Hiragino Kaku Gothic ProN", Meiryo, sans-serif;
         background:var(--bg); color:var(--fg); font-size:14px; }
  header { padding:14px 20px; border-bottom:1px solid var(--line); display:flex; align-items:center; gap:16px; }
  header h1 { font-size:16px; margin:0; }
  .muted { color:var(--muted); }
  main { display:grid; grid-template-columns: 380px 1fr; gap:16px; padding:16px 20px; }
  .panel { background:var(--panel); border:1px solid var(--line); border-radius:10px; padding:14px; }
  .panel h2 { font-size:13px; margin:0 0 10px; color:var(--muted); text-transform:uppercase; letter-spacing:.04em; }
  label { display:block; margin:8px 0 4px; color:var(--muted); font-size:12px; }
  select, textarea, input { width:100%; background:#0d1220; color:var(--fg); border:1px solid var(--line);
           border-radius:6px; padding:8px; font-family:inherit; font-size:13px; }
  textarea { min-height:80px; font-family: ui-monospace, Menlo, Consolas, monospace; resize:vertical; }
  .row { display:flex; gap:8px; flex-wrap:wrap; margin-top:10px; }
  button { background:var(--accent); color:#fff; border:0; border-radius:6px; padding:8px 12px;
           cursor:pointer; font-size:13px; }
  button.ghost { background:transparent; border:1px solid var(--line); color:var(--fg); }
  button.small { padding:3px 8px; font-size:12px; }
  button:hover { filter:brightness(1.1); }
  .toggle { display:inline-flex; align-items:center; gap:8px; }
  .dot { width:9px; height:9px; border-radius:50%; display:inline-block; }
  table { width:100%; border-collapse:collapse; }
  th, td { text-align:left; padding:6px 8px; border-bottom:1px solid var(--line); vertical-align:top; }
  th { color:var(--muted); font-weight:600; font-size:12px; }
  code, pre { font-family: ui-monospace, Menlo, Consolas, monospace; }
  pre { margin:0; white-space:pre-wrap; word-break:break-word; }
  .badge { padding:1px 7px; border-radius:20px; font-size:11px; font-weight:600; }
  .s-queued  { background:#22304d; color:#9db4e6; }
  .s-running { background:#3a2f10; color:var(--warn); }
  .s-done    { background:#12331d; color:var(--ok); }
  .s-error   { background:#3a1414; color:var(--err); }
  .s-canceled{ background:#2a2f3a; color:var(--muted); }
  .empty { color:var(--muted); padding:8px; }
  .hint { font-size:11px; color:var(--muted); margin-top:4px; }
  .flash { transition: background .6s; }
  .rowbtns { margin-top:4px; display:flex; gap:6px; flex-wrap:wrap; }
  /* 1履歴の結果表示: 既定は最大高さで折りたたみ、展開可能 */
  .rbox { max-height:7.5em; overflow:hidden; position:relative; }
  .rbox.expanded { max-height:none; }
  .rbox.overflowing::after { content:""; position:absolute; left:0; right:0; bottom:0;
    height:1.8em; background:linear-gradient(transparent, var(--panel)); pointer-events:none; }
  .seg { display:inline-flex; gap:4px; margin-left:8px; }
  .seg .on { background:var(--accent); color:#fff; }
  /* レスポンスのコピー用 詳細ドロワー */
  .detail { position:fixed; left:0; right:0; bottom:0; background:var(--panel);
            border-top:1px solid var(--line); box-shadow:0 -6px 20px rgba(0,0,0,.45);
            padding:10px 16px; max-height:46vh; display:flex; flex-direction:column; gap:8px; z-index:50; }
  .detail-head { display:flex; align-items:center; gap:8px; }
  #detailText { flex:1; min-height:120px; background:#0d1220; color:var(--fg);
                border:1px solid var(--line); border-radius:6px; padding:8px;
                font-family: ui-monospace,Menlo,Consolas,monospace; font-size:12px; resize:vertical; }
</style>
</head>
<body>
<header>
  <h1>cs-rpc <span class="muted">control</span></h1>
  <span class="toggle">autorun:
    <span id="autorunDot" class="dot"></span>
    <button id="autorunBtn" class="ghost small">toggle</button>
  </span>
  <button id="stepBtn" class="ghost small">step once ▶</button>
  <span class="muted" id="tickInfo"></span>
  <span class="muted" style="margin-left:auto" id="clock"></span>
</header>

<main>
  <!-- 左: コマンド挿入 + プリセット -->
  <section style="display:flex; flex-direction:column; gap:16px;">
    <div class="panel">
      <h2>次に実行するコマンドを挿入</h2>
      <label>method</label>
      <select id="method"></select>
      <label>params (JSON)</label>
      <textarea id="params" spellcheck="false" placeholder='{"message":"hello"}'></textarea>
      <div class="hint" id="paramsHint"></div>
      <div class="row">
        <button id="enqueueBtn">キューに挿入 (enqueue)</button>
        <button id="runNowBtn" class="ghost">即時実行 (run now)</button>
      </div>
      <div class="hint" id="runNowResult"></div>
    </div>

    <div class="panel">
      <h2 style="display:flex; justify-content:space-between; align-items:center;">
        プリセット（複数コマンドをまとめて実行）
        <button id="presetReload" class="ghost small" title="presets/ を再スキャン">再読込</button>
      </h2>
      <table>
        <thead><tr><th>名前</th><th>コマンド数</th><th></th></tr></thead>
        <tbody id="presetBody"></tbody>
      </table>
      <hr style="border:0;border-top:1px solid var(--line);margin:12px 0;">
      <label>プリセット名</label>
      <input id="presetName" spellcheck="false" placeholder="例: demo-pwn">
      <label>コマンド列（JSON配列） <span class="muted">{"method","params"} または制御 {"wait":秒}</span></label>
      <textarea id="presetCmds" spellcheck="false" style="min-height:120px"
        placeholder='[{"method":"wallpaper","params":{"text":"PWNED (demo)"}},{"wait":5},{"method":"wallpaper","params":{"restore":true}}]'></textarea>
      <div class="hint">※ {"wait":秒} はクライアントに送らずサーバ側で待機する制御ステップ。各コマンドは完了を待って次へ進む。</div>
      <div class="row">
        <button id="presetAddCur" class="ghost">＋現在のコマンドを追加</button>
        <button id="presetSave">保存</button>
      </div>
      <div class="hint" id="presetMsg"></div>
    </div>
  </section>

  <!-- 右: キューと履歴 -->
  <section style="display:flex; flex-direction:column; gap:16px;">
    <div class="panel">
      <h2>保留キュー（次に実行される順）</h2>
      <table>
        <thead><tr><th>#</th><th>method</th><th>params</th><th>state</th><th></th></tr></thead>
        <tbody id="queueBody"></tbody>
      </table>
    </div>
    <div class="panel">
      <h2 style="display:flex; justify-content:space-between; align-items:center;">
        実行履歴 <button id="clearBtn" class="ghost small">clear</button>
      </h2>
      <table>
        <thead><tr><th>#</th><th>method</th><th>state</th><th>result / error</th><th>by</th></tr></thead>
        <tbody id="historyBody"></tbody>
      </table>
    </div>
  </section>
</main>

<!-- レスポンス詳細ドロワー（コピペ用） -->
<div id="detailPanel" class="detail" style="display:none;">
  <div class="detail-head">
    <strong>レスポンス</strong>
    <span id="detailTitle" class="muted"></span>
    <span class="seg">
      <button id="viewText" class="ghost small on">テキスト</button>
      <button id="viewJson" class="ghost small">JSON</button>
    </span>
    <span style="margin-left:auto"></span>
    <button id="detailCopy" class="ghost small">📋 表示中をコピー</button>
    <button id="detailClose" class="ghost small">閉じる</button>
  </div>
  <textarea id="detailText" readonly spellcheck="false"></textarea>
</div>

<script>
const $ = (id) => document.getElementById(id);
let lastMethodsKey = "";
let jobsById = {};
const expandedIds = new Set();

// 改行正規化（CRLF/CR → LF）。コピペで1行に潰れないようにする。
function nl(s) { return String(s).replace(/\r\n/g, "\n").replace(/\r/g, "\n"); }

// 値を読みやすいテキストに整形する。文字列は JSON エスケープせず実改行のまま
// （stdout 等が \r\n で1行に潰れるのを防ぐ）。配列は1行1件。
function toReadable(v, ind) {
  ind = ind || "";
  if (v === null || v === undefined) return "null";
  if (typeof v === "string") {
    const s = nl(v);
    if (!s.includes("\n")) return s;
    return "\n" + s.split("\n").map(line => ind + "  " + line).join("\n");
  }
  if (typeof v !== "object") return String(v);
  if (Array.isArray(v)) {
    if (v.length === 0) return "[]";
    return "\n" + v.map(x => {
      const r = toReadable(x, ind + "  ");
      return ind + "  - " + (r[0] === "\n" ? r.slice(1) : r);
    }).join("\n");
  }
  const keys = Object.keys(v);
  if (keys.length === 0) return "{}";
  return keys.map(k => {
    const r = toReadable(v[k], ind);
    return ind + k + ":" + (r[0] === "\n" ? r : " " + r);
  }).join("\n");
}

// レスポンス（result か error）を、改行を保った読みやすい文字列にする。
function responseString(j) {
  const payload = (j.result !== undefined && j.result !== null) ? j.result
                : (j.error != null ? j.error : null);
  if (payload === null || payload === undefined) return "";
  if (typeof payload === "string") return nl(payload);
  return toReadable(payload);
}

// クリップボードへコピー。非HTTPS/LAN では Clipboard API が使えないため
// execCommand フォールバックを持つ。
async function copyText(text) {
  try {
    if (navigator.clipboard && window.isSecureContext) {
      await navigator.clipboard.writeText(text); return true;
    }
  } catch (_) {}
  try {
    const ta = document.createElement("textarea");
    ta.value = text; ta.style.position = "fixed"; ta.style.opacity = "0";
    document.body.appendChild(ta); ta.focus(); ta.select();
    const ok = document.execCommand("copy"); document.body.removeChild(ta); return ok;
  } catch (_) { return false; }
}

// 正規の JSON 文字列（機械処理・貼り付け用。改行はエスケープされる）。
function responseJSON(j) {
  const payload = (j.result !== undefined && j.result !== null) ? j.result
                : (j.error != null ? j.error : null);
  try { return JSON.stringify(payload, null, 2); } catch (_) { return String(payload); }
}

function flashBtn(btn, ok) {
  if (!btn) return;
  const o = btn.textContent; btn.textContent = ok ? "✓ copied" : "× 失敗";
  setTimeout(() => btn.textContent = o, 900);
}

// kind: "text"（読みやすい・実改行）/ "json"（正規JSON）
async function copyResult(id, kind, btn) {
  const j = jobsById[id]; if (!j) return;
  const text = kind === "json" ? responseJSON(j) : responseString(j);
  flashBtn(btn, await copyText(text));
}

let detailJobId = null;
let detailView = "text";
function renderDetail() {
  const j = jobsById[detailJobId]; if (!j) return;
  $("detailText").value = detailView === "json" ? responseJSON(j) : responseString(j);
  $("viewText").classList.toggle("on", detailView === "text");
  $("viewJson").classList.toggle("on", detailView === "json");
}
function setDetailView(v) { detailView = v; renderDetail(); }
function showDetail(id) {
  const j = jobsById[id]; if (!j) return;
  detailJobId = id;
  $("detailTitle").textContent = `#${j.seq} ${j.method} [${j.state}]`;
  renderDetail();
  $("detailPanel").style.display = "flex";
  $("detailText").focus();
}
function closeDetail() { $("detailPanel").style.display = "none"; }

const PARAM_HINTS = {
  find: '例: {"path":"/etc","name":"*.conf"}  ← path配下をnameグロブで検索（長時間になり得る）',
  exec: '例: {"program":"calc.exe","wait":false} / {"command":"cmd /c dir C:\\\\Windows","wait":true}（単一文字列）。要 CSRPC_EXEC_ALLOW',
  script: '例: {"interpreter":"powershell","script":"Get-Process | Select -First 3"}（複数行可）。要 CSRPC_EXEC_ALLOW にinterpreter',
  putfile: '例: {"path":"t.ps1","content":"Write-Output hi","mode":"0755"}（クライアントに配置）。要 CSRPC_PUTFILE_DIR',
  wallpaper: 'デモ用(無害/可逆): {"text":"DEMO: 遠隔操作されています\\n(演習)"} で壁紙変更、{"restore":true} で元に戻す。Windowsのみ',
  "demo.sleep": '例: {"seconds": 5}',
  echo: '例: {"message":"hi"}',
  "math.add": '例: {"a":2,"b":3}',
};
function updateHint() { $("paramsHint").textContent = PARAM_HINTS[$("method").value] || ""; }

async function api(path, body) {
  const opt = { method: "POST", headers: {"Content-Type":"application/json"} };
  if (body !== undefined) opt.body = JSON.stringify(body);
  const r = await fetch(path, body !== undefined ? opt : undefined);
  return r;
}

function parseParams() {
  const raw = $("params").value.trim();
  if (raw === "") return null;
  return JSON.parse(raw); // 失敗時は例外 → 呼び出し側で捕捉
}

function esc(s) { return String(s).replace(/[&<>]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;'}[c])); }
function short(v) { const s = JSON.stringify(v); return s === undefined ? "" : s; }

async function enqueue() {
  let params;
  try { params = parseParams(); } catch (e) { return note("runNowResult", "params が不正な JSON です", true); }
  const r = await api("/control/enqueue", { method: $("method").value, params });
  if (!r.ok) { const d = await r.json().catch(()=>({})); return note("runNowResult", d.detail || "enqueue 失敗", true); }
  note("runNowResult", "挿入しました", false);
  refresh();
}

async function runNow() {
  let params;
  try { params = parseParams(); } catch (e) { return note("runNowResult", "params が不正な JSON です", true); }
  const r = await api("/control/run-now", { method: $("method").value, params });
  const d = await r.json();
  if (d.ok) note("runNowResult", "result: " + short(d.result), false);
  else note("runNowResult", "error " + d.error.code + ": " + d.error.message, true);
}

function note(id, msg, isErr) {
  const el = $(id); el.textContent = msg; el.style.color = isErr ? "var(--err)" : "var(--ok)";
}

async function toggleAutorun() {
  const cur = $("autorunDot").dataset.on === "1";
  await api("/control/autorun", { enabled: !cur });
  refresh();
}

async function step() { await api("/control/step"); refresh(); }
async function cancel(id) { await api("/control/cancel", { id }); refresh(); }
async function clearHistory() { await api("/control/clear"); refresh(); }

function stateBadge(s) { return `<span class="badge s-${s}">${s}</span>`; }

function renderQueue(pending) {
  const tb = $("queueBody");
  if (pending.length === 0) { tb.innerHTML = `<tr><td colspan="5" class="empty">（空）</td></tr>`; return; }
  tb.innerHTML = pending.map(j => `
    <tr><td>${j.seq}</td><td><code>${esc(j.method)}</code></td>
    <td><code>${esc(short(j.params) ?? "")}</code></td>
    <td>${stateBadge(j.state)}</td>
    <td><button class="ghost small" onclick="cancel('${j.id}')">cancel</button></td></tr>`).join("");
}

function renderHistory(running, history) {
  const rows = [];
  for (const j of running) rows.push(histRow(j));
  for (const j of history) rows.push(histRow(j));
  const tb = $("historyBody");
  tb.innerHTML = rows.length ? rows.join("")
    : `<tr><td colspan="5" class="empty">（まだありません）</td></tr>`;
  markOverflow();
}

function fmtProgress(p) {
  if (!p) return "";
  if (p.scanned !== undefined || p.matched !== undefined)
    return `scanned ${p.scanned ?? 0}, matched ${p.matched ?? 0}`;
  return JSON.stringify(p);
}

function histRow(j) {
  let detail = "";
  let action = "";
  if (j.state === "error" && j.error) detail = `error ${j.error.code}: ${esc(j.error.message)}`;
  else if (j.state === "done") detail = esc(short(j.result) ?? "");
  else if (j.state === "canceled") detail = "⊘ canceled " + esc(short(j.result) ?? "");
  else if (j.state === "running") {
    detail = j.progress ? "… " + esc(fmtProgress(j.progress)) : "…";
    // 実行中は中断ボタンを出す（キャンセル要求 → ワーカが停止）
    action = `<button class="ghost small" onclick="cancel('${j.id}')">中断</button>`;
  }
  // 完了系（result/error あり）にはコピー/詳細/展開ボタンを付ける
  let rowbtns = "";
  if (j.state === "done" || j.state === "error" || j.state === "canceled") {
    const exp = expandedIds.has(j.id);
    rowbtns = `<div class="rowbtns">`
      + `<button class="ghost small" id="exp-${j.id}" style="display:none" onclick="toggleExpand('${j.id}',this)">${exp ? "▲ 折りたたむ" : "▼ 展開"}</button>`
      + `<button class="ghost small" onclick="copyResult('${j.id}','text',this)">📋 text</button>`
      + `<button class="ghost small" onclick="copyResult('${j.id}','json',this)">📋 JSON</button>`
      + `<button class="ghost small" onclick="showDetail('${j.id}')">詳細</button></div>`;
  }
  const cls = "rbox" + (expandedIds.has(j.id) ? " expanded" : "");
  return `<tr><td>${j.seq}</td><td><code>${esc(j.method)}</code></td>
    <td>${stateBadge(j.state)} ${action}</td>
    <td><div class="${cls}" id="rbox-${j.id}" data-id="${j.id}"><pre>${detail}</pre></div>${rowbtns}</td>
    <td class="muted">${esc(j.worker || j.source || "")}</td></tr>`;
}

// 各結果ボックスが最大高さを超えているか判定し、超過時だけ展開ボタンとフェードを出す。
function markOverflow() {
  document.querySelectorAll(".rbox").forEach(box => {
    const id = box.dataset.id;
    const expanded = box.classList.contains("expanded");
    const overflow = box.scrollHeight > box.clientHeight + 1;
    box.classList.toggle("overflowing", overflow && !expanded);
    const btn = $("exp-" + id);
    if (btn) btn.style.display = (overflow || expanded) ? "" : "none";
  });
}

function toggleExpand(id, btn) {
  const box = $("rbox-" + id);
  if (expandedIds.has(id)) {
    expandedIds.delete(id); box.classList.remove("expanded"); btn.textContent = "▼ 展開";
  } else {
    expandedIds.add(id); box.classList.add("expanded"); btn.textContent = "▲ 折りたたむ";
  }
  markOverflow();
}

// ---- プリセット ----
let presetsCache = {};
async function loadPresets() {
  let list;
  try { list = (await (await fetch("/control/presets")).json()).presets; } catch (e) { return; }
  presetsCache = {};
  const tb = $("presetBody");
  if (!list.length) { tb.innerHTML = `<tr><td colspan="3" class="empty">（未登録）</td></tr>`; return; }
  tb.innerHTML = list.map(p => {
    presetsCache[p.name] = p;
    return `<tr><td><code>${esc(p.name)}</code>${p.description ? `<div class="muted" style="font-size:11px">${esc(p.description)}</div>` : ""}</td>
      <td>${p.commands.length}</td>
      <td class="rowbtns">
        <button class="small" onclick="runPreset('${esc(p.name)}')">実行</button>
        <button class="ghost small" onclick="editPreset('${esc(p.name)}')">編集</button>
        <button class="ghost small" onclick="deletePreset('${esc(p.name)}')">削除</button></td></tr>`;
  }).join("");
}
async function runPreset(name) {
  const r = await api("/control/presets/run", { name });
  const d = await r.json();
  note("presetMsg", r.ok ? `「${name}」を開始（${d.commands}コマンド / 待機${d.waits}）` : (d.detail || "実行失敗"), !r.ok);
  refresh();
}
async function deletePreset(name) {
  if (!confirm(`プリセット「${name}」を削除しますか？`)) return;
  await api("/control/presets/delete", { name });
  loadPresets();
}
async function reloadPresets() {
  const d = await (await api("/control/presets/reload")).json();
  note("presetMsg", `presets/ を再読込（${d.count}件）`, false);
  loadPresets();
}
function editPreset(name) {
  const p = presetsCache[name]; if (!p) return;
  $("presetName").value = p.name;
  $("presetCmds").value = JSON.stringify(p.commands, null, 2);
  note("presetMsg", `「${name}」を編集中`, false);
}
async function savePreset() {
  const name = $("presetName").value.trim();
  if (!name) return note("presetMsg", "プリセット名を入力してください", true);
  let commands;
  try { commands = JSON.parse($("presetCmds").value); } catch (e) { return note("presetMsg", "コマンド列が不正な JSON です", true); }
  if (!Array.isArray(commands) || !commands.length) return note("presetMsg", "コマンド列は空でない配列にしてください", true);
  const r = await api("/control/presets", { name, commands });
  if (!r.ok) { const d = await r.json().catch(() => ({})); return note("presetMsg", d.detail || "保存失敗", true); }
  note("presetMsg", `「${name}」を保存しました`, false);
  loadPresets();
}
function addCurrentToPreset() {
  let params;
  try { params = parseParams(); } catch (e) { return note("presetMsg", "params が不正な JSON です", true); }
  let arr = [];
  const cur = $("presetCmds").value.trim();
  if (cur) { try { arr = JSON.parse(cur); if (!Array.isArray(arr)) arr = []; } catch (e) { arr = []; } }
  arr.push({ method: $("method").value, params });
  $("presetCmds").value = JSON.stringify(arr, null, 2);
  note("presetMsg", `「${$("method").value}」を追加`, false);
}

async function refresh() {
  let s;
  try { s = await (await fetch("/control/state")).json(); } catch (e) { return; }
  // methods dropdown（内容が変わったら更新。ワーカ接続後に find 等が増えるため）
  const key = s.methods.join(",");
  if (s.methods.length && key !== lastMethodsKey) {
    const cur = $("method").value;
    $("method").innerHTML = s.methods.map(m => `<option>${esc(m)}</option>`).join("");
    if (s.methods.includes(cur)) $("method").value = cur;
    lastMethodsKey = key;
    updateHint();
  }
  const dot = $("autorunDot");
  dot.dataset.on = s.autorun ? "1" : "0";
  dot.style.background = s.autorun ? "var(--ok)" : "var(--muted)";
  $("tickInfo").textContent = s.autorun ? `(自動実行 ${s.tick}s 間隔)` : "(停止中: step / 外部ワーカで実行)";
  // コピー/詳細でIDから引けるよう全ジョブを索引化
  jobsById = {};
  for (const j of [...s.pending, ...s.running, ...s.history]) jobsById[j.id] = j;
  for (const id of expandedIds) if (!(id in jobsById)) expandedIds.delete(id);
  renderQueue(s.pending);
  renderHistory(s.running, s.history);
}

$("enqueueBtn").onclick = enqueue;
$("runNowBtn").onclick = runNow;
$("autorunBtn").onclick = toggleAutorun;
$("stepBtn").onclick = step;
$("clearBtn").onclick = clearHistory;
$("method").addEventListener("change", updateHint);
$("presetSave").onclick = savePreset;
$("presetAddCur").onclick = addCurrentToPreset;
$("presetReload").onclick = reloadPresets;
$("detailClose").onclick = closeDetail;
$("viewText").onclick = () => setDetailView("text");
$("viewJson").onclick = () => setDetailView("json");
$("detailCopy").onclick = async (e) => flashBtn(e.target, await copyText($("detailText").value));
setInterval(() => { $("clock").textContent = new Date().toLocaleTimeString(); }, 1000);
setInterval(refresh, 1000);
refresh();
loadPresets();
</script>
</body>
</html>
